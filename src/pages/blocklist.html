<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Surfingkeys - Disabled Sites</title>
        <style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 0 20px;
    color: #333;
}
h1 {
    font-size: 20px;
    margin-bottom: 8px;
}
.hint {
    font-size: 13px;
    color: #666;
    margin-bottom: 16px;
    line-height: 1.5;
}
.hint code {
    background: #f0f0f0;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 12px;
}
.add-form {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}
.add-form input {
    flex: 1;
    padding: 8px 12px;
    font-size: 14px;
    font-family: monospace;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.add-form button {
    padding: 8px 16px;
    font-size: 14px;
    background: #4285f4;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
}
.add-form button:hover {
    background: #3367d6;
}
.site-list {
    list-style: none;
    padding: 0;
}
.site-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border: 1px solid #eee;
    border-radius: 4px;
    margin-bottom: 4px;
}
.site-item:nth-child(odd) {
    background: #f9f9f9;
}
.site-item .pattern {
    flex: 1;
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    min-height: 20px;
    border: 1px dashed transparent;
}
.site-item .pattern:hover {
    background: #e8f0fe;
    border-color: #4285f4;
}
.site-item .pattern::after {
    content: '\270E';
    font-size: 11px;
    color: #999;
    margin-left: 6px;
    opacity: 0;
}
.site-item .pattern:hover::after {
    opacity: 1;
}
.site-item .edit-input {
    flex: 1;
    font-family: monospace;
    font-size: 14px;
    padding: 2px 4px;
    border: 1px solid #4285f4;
    border-radius: 3px;
    outline: none;
}
.site-item .remove {
    color: #dc3545;
    cursor: pointer;
    font-size: 18px;
    border: none;
    background: none;
    padding: 0 4px;
    line-height: 1;
}
.site-item .remove:hover {
    color: #a71d2a;
}
.site-item .save-btn,
.site-item .cancel-btn {
    font-size: 12px;
    padding: 2px 8px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
}
.site-item .save-btn {
    background: #4285f4;
    color: white;
}
.site-item .cancel-btn {
    background: #e0e0e0;
    color: #333;
}
.empty-msg {
    color: #999;
    font-style: italic;
    padding: 8px 12px;
}
        </style>
    </head>
    <body>
        <h1>Disabled Sites</h1>
        <p class="hint">
            Add URLs or patterns to disable Surfingkeys on specific pages.<br>
            <code>https://example.com</code> &mdash; exact origin<br>
            <code>https://example.com/path/*</code> &mdash; URL path with wildcard<br>
            <code>*://*.example.com</code> &mdash; all subdomains with any scheme<br>
            Click any entry to edit it.
        </p>
        <div class="add-form">
            <input type="text" id="newOrigin" placeholder="https://example.com or *://*.example.com">
            <button id="addBtn">Add</button>
        </div>
        <ul class="site-list" id="siteList"></ul>
        <script src="blocklist.js"></script>
    </body>
</html>
